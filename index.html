<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Биохимия: тест</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0d1117;
    font-family: Georgia, serif;
    color: #d0d8f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 48px;
  }
  #header {
    width: 100%; max-width: 720px;
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 24px 8px;
  }
  #header-title { font-size: 18px; font-weight: 700; color: #7eb8f7; letter-spacing: 1px; }
  #header-score {
    font-size: 15px; color: #00e676; font-weight: 700;
    background: #0d2b1a; padding: 4px 14px; border-radius: 20px;
  }
  #progress-bar { width: 100%; max-width: 720px; height: 4px; background: #1e2436; margin-bottom: 18px; }
  #progress-fill { height: 100%; background: linear-gradient(90deg,#3d6fff,#00e676); border-radius: 4px; transition: width .4s; }
  #card {
    width: 100%; max-width: 720px;
    background: #131824; border-radius: 16px;
    padding: 28px 28px 24px; margin: 0 12px;
    box-shadow: 0 4px 32px rgba(0,0,0,.5);
  }
  #q-num { font-size: 11px; color: #4a5580; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; }
  #q-text { font-size: 15px; line-height: 1.7; margin-bottom: 22px; white-space: pre-line; color: #c8d4f0; }
  #options { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 16px; border-radius: 10px; cursor: pointer;
    font-size: 14px; line-height: 1.5; text-align: left;
    transition: all .15s; font-family: Georgia, serif;
    background: #1a1f2e; border: 1.5px solid #2a3050; color: #d0d8f0;
  }
  .opt-btn:hover:not(:disabled) { border-color: #3d6fff; background: #1a2240; }
  .opt-btn:disabled { cursor: default; }
  .opt-btn.correct { background: #0d2b1a; border-color: #00e676; color: #00e676; }
  .opt-btn.wrong   { background: #2b0d0d; border-color: #ff5252; color: #ff5252; }
  .opt-letter { font-weight: 900; font-size: 13px; color: #4a6fff; min-width: 20px; margin-top: 1px; }
  #feedback {
    margin-top: 22px; padding: 16px 18px;
    background: #0e1420; border-radius: 12px; border: 1px solid #1e2a4a;
    display: none;
  }
  #feedback.show { display: block; }
  #fb-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  #fb-label { font-weight: 700; font-size: 16px; }
  #expl-btn {
    margin-left: auto; background: transparent; border: 1px solid #3d4a7a;
    color: #7eb8f7; border-radius: 8px; padding: 3px 12px;
    font-size: 12px; cursor: pointer; font-family: Georgia, serif;
  }
  #explanation {
    font-size: 13px; color: #8a9bc0; line-height: 1.6;
    margin-bottom: 14px; padding: 10px 14px;
    background: #0d1220; border-radius: 8px;
    border-left: 3px solid #3d6fff; display: none;
  }
  #explanation.show { display: block; }
  #next-btn {
    margin-top: 8px; background: linear-gradient(135deg,#1e3a8a,#3d6fff);
    color: #fff; border: none; border-radius: 10px;
    padding: 12px 24px; font-size: 14px; font-weight: 700;
    cursor: pointer; width: 100%; font-family: Georgia, serif; letter-spacing: .5px;
  }
  #finish {
    margin-top: 80px; background: #131824; border-radius: 20px;
    padding: 48px 40px; max-width: 480px; width: 90%;
    text-align: center; box-shadow: 0 8px 48px rgba(0,0,0,.6);
    display: none;
  }
  #finish.show { display: block; }
  #finish-emoji { font-size: 64px; margin-bottom: 12px; }
  #finish-title { font-size: 28px; font-weight: 900; margin-bottom: 24px; letter-spacing: 1px; }
  #score-circle {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 160px; height: 160px; border-radius: 50%;
    background: #0d1220; border: 4px solid #1e2a4a;
    margin: 0 auto 32px;
  }
  #score-pct { font-size: 48px; font-weight: 900; }
  #score-sub { font-size: 14px; color: #aaa; margin-top: 4px; }
  #restart-btn {
    background: linear-gradient(135deg,#1e3a8a,#3d6fff);
    color: #fff; border: none; border-radius: 12px;
    padding: 14px 40px; font-size: 16px; font-weight: 700;
    cursor: pointer; font-family: Georgia, serif;
  }
</style>
</head>
<body>

<div id="header">
  <span id="header-title">🧬 Биохимия: тест</span>
  <span id="header-score">✓ 0 / 76</span>
</div>
<div id="progress-bar"><div id="progress-fill" style="width:0%"></div></div>

<div id="card">
  <div id="q-num"></div>
  <p id="q-text"></p>
  <div id="options"></div>
  <div id="feedback">
    <div id="fb-top">
      <span id="fb-icon" style="font-size:22px"></span>
      <span id="fb-label"></span>
      <button id="expl-btn" onclick="toggleExpl()">Пояснение</button>
    </div>
    <div id="explanation"></div>
    <button id="next-btn" onclick="nextQ()">Следующий вопрос →</button>
  </div>
</div>

<div id="finish">
  <div id="finish-emoji"></div>
  <div id="finish-title"></div>
  <div id="score-circle">
    <span id="score-pct"></span>
    <span id="score-sub"></span>
  </div>
  <button id="restart-btn" onclick="restart()">Начать заново</button>
</div>

<script>
const questions = [
  { text: "Выберите правильный вариант:\n1) Сахарный диабет 1 типа; 2) Сахарный диабет 2 типа.\nA) аутоиммунное заболевание; b) снижение чувствительности GLUT-4 к инсулину; c) встречается у пожилых людей; d) встречается у детей; e) в основном лечится инсулинотерапией; f) лечится гипогликемическими препаратами и диетой.", options: ["1-a,d,e. 2-b,c,f.","1-a,d,f. 2-b,c,e.","1-b,c,f. 2-a,d,e.","1-a,c,d,e. 2-b,c,f."], correct: 0, expl: "СД1: аутоиммунный, у детей, инсулинотерапия. СД2: снижение GLUT-4, у пожилых, диета+гипогликемики" },
  { text: "Казеин и лактоза в 1-женском молоке и 2-коровьем представлены:\na. альфа-казеин; б. бета-казеин; в. альфа-лактоза; г. бета-лактоза", options: ["1-б,г 2-а,в","1-а,г 2-а,в","1-а,г 2-б,в","1-б,г 2-б,в"], correct: 0, expl: "Женское молоко: β-казеин, β-лактоза; Коровье: α-казеин, α-лактоза" },
  { text: "Титрационная кислотность и плотность: 1-женского молока, 2-коровьего равна:\nа. 5-9; б. 17-18; в. 1,026; г. 1,028", options: ["1-б,г 2-а,б","1-а,г 2-а,в","1-а,г 2-б,в","1-б,г 2-б,в","1-а,в 2-б,г"], correct: 4, expl: "Женское: кислотность 5-9° (а), плотность 1,026 (в); Коровье: 17-18° (б), 1,028 (г)" },
  { text: "В какие периоды наблюдается 1) Положительный и 2) Отрицательный азотистый баланс?\na. в старости; б. при белковом голодании; в. во время болезни; г. при выздоровлении; д. при голодании; е. у маленьких детей.", options: ["1.ге, 2.aбвд","1.аб, 2.гд","1.бв, 2.aгдe","1.ae, 2.бвг"], correct: 0, expl: "Положит. баланс: выздоровление (г), дети (е); Отрицат.: старость, голодание, болезнь" },
  { text: "Жирные кислоты с четырьмя (1), тремя (2), двумя (3) двойными связями:\na. Линолевая; b. Линоленовая; v. Олеиновая; g. Арахидоновая; d. Невроновая.", options: ["1g, 2b, 3a","1a, 2b, 3v","1b, 2v, 3a","1d, 2g, 3a"], correct: 0, expl: "Арахидоновая (20:4) — 4 двойные связи; Линоленовая (18:3) — 3; Линолевая (18:2) — 2" },
  { text: "Транспортеры глюкозы: 1-GLUT-4; 2-GLUT-5.\na) жировая ткань; б) мышцы; в) кишечник; г) почки.", options: ["1-а,б; 2-в,г.","1-a,б,г; 2-в.","1-б,г; 2-а,в.","1-a,б,в; 2-г."], correct: 0, expl: "GLUT-4: жировая ткань + мышцы (инсулинзависимый); GLUT-5: кишечник + почки" },
  { text: "1.НАД-зависимые дегидрогеназы; 2.ФАД-зависимые дегидрогеназы.\na) Изоцитратдегидрогеназа; б) α-кетоглутаратдегидрогеназа; c) Малатдегидрогеназа; д) Сукцинатдегидрогеназа.", options: ["1-а,б; 2-с,д.","1-б,с,д; 2-а.","1-a,б,c; 2-д.","1-a,д; 2-б,c."], correct: 2, expl: "НАД-зависимые: изоцитрат-, α-кетоглутарат-, малатдегидрогеназа; ФАД: сукцинатдегидрогеназа" },
  { text: "1-Ферменты глюконеогенеза; 2-Ферменты гликолиза.\nа) Глюкокиназа; б) Глюкозо-6-фосфатаза; в) Фосфофруктокиназа; г) Пируваткиназа; д) Пируваткарбоксилаза; е) Фруктозо-1,6-бисфосфатаза.", options: ["1-б,д,е; 2-а,в,г.","1-a,в,г; 2-б,д,е.","1-б,г,е; 2-а,в,д.","1-б,в,е; 2-а,д,г."], correct: 0, expl: "Глюконеогенез: Г-6-фосфатаза, пируваткарбоксилаза, Ф-1,6-бисфосфатаза; Гликолиз: глюкокиназа, ФФК, пируваткиназа" },
  { text: "1. Повышает уровень глюкозы; 2. Снижает уровень глюкозы.\nа) Инсулин; б) Глюкагон; в) Адреналин; г) Кортизол.", options: ["1-а; 2-б,в,г.","1-a,г; 2-б,в.","1-б,в,г; 2-а.","1-б,в; 2-а,г"], correct: 2, expl: "Повышают глюкозу: глюкагон, адреналин, кортизол; Снижает: только инсулин" },
  { text: "1-Ферменты гликогенеза; 2-Ферменты гликогенолиза.\nа) гликогенсинтаза; b) гликогенфосфорилаза; c) фермент ветвления; d) UDF-глюкозопирофосфорилаза; e) фосфоглюкомутаза; f) 4-α-глюканотрансфераза", options: ["1-a,c,d; 2-b,e,f.","1-a,b,c; 2-d,e,f.","1-a,b,c,d; 2-e,f.","1-a,c,d,e; 2-b,e,f."], correct: 0, expl: "Гликогенез: гликогенсинтаза, фермент ветвления, УДФ-глюкозопирофосфорилаза; Гликогенолиз: гликогенфосфорилаза, фосфоглюкомутаза, 4-α-глюканотрансфераза" },
  { text: "Субстраты для: 1) субстратного фосфорилирования; 2) окислительного фосфорилирования.\nа) пируват; b) фосфоенолпируват; c) сукцинил-КоА; d) сукцинат; e) изоцитрат; f) 1,3-бифосфоглицерат; g) глицеральдегид-3-фосфат.", options: ["1-b,d,f,g; 2-a,c,e.","1-b,c,d,f; 2-a,e,g.","1-a,b,d,e; 2-c,f,g.","1-b,c,f,g; 2-a,d,e."], correct: 3, expl: "Субстратное фосфорилирование: ФЕП (b), сукцинил-КоА (c), 1,3-БФГ (f), ГАФД (g); Окислительное: пируват, сукцинат, изоцитрат" },
  { text: "Наибольшее количество белка (1) и холестерина (2) среди липопротеидов:\na. ЛПОНП; b. ЛПВП; v. Хиломикроны; g. ЛПНП; d. ЛППП.", options: ["1-g, 2-d","1-a, 2-v","1-b, 2-a","1-b, 2-g"], correct: 3, expl: "Наибольший белок → ЛПВП; Наибольший холестерин → ЛПНП" },
  { text: "Где происходит биосинтез (1) и β-окисление (2) жирных кислот?\na. В ядре; b. В цитоплазме; v. На мембране; g. В митохондриях; d. В микросомах.", options: ["1-b, 2-g","1-v, 2-d","1-g, 2-d","1-b, 2-a"], correct: 0, expl: "Биосинтез ЖК → цитоплазма; β-окисление ЖК → митохондрии" },
  { text: "Где формируются ЛПВП (1) и хиломикроны (2)?\na. В печени; b. В почках; v. В эпителии кишечника; g. В жировой ткани; d. В крови.", options: ["1-a, 2-v","1-a, 2-b","1-b, 2-g","1-g, 2-g"], correct: 0, expl: "ЛПВП формируются в печени; Хиломикроны — в эпителии кишечника" },
  { text: "Где формируются ЛПОНП (1) и ЛПНП (2)?\na. В печени; b. В почках; v. В эпителии кишечника; g. В жировой ткани; d. В крови.", options: ["1-a, 2-d","1-a, 2-b","1-b, 2-g","1-g, 2-g"], correct: 0, expl: "ЛПОНП — в печени; ЛПНП — в крови (из ЛПОНП под действием ЛПЛ)" },
  { text: "Где формируются хиломикроны (1) и ЛПНП (2)?\na. В печени; b. В почках; v. В эпителии кишечника; g. В жировой ткани; d. В крови.", options: ["1-v, 2-d","1-a, 2-b","1-b, 2-g","1-g, 2-g"], correct: 0, expl: "Хиломикроны — эпителий кишечника (v); ЛПНП — в крови (d)" },
  { text: "Какие липопротеиды обладают атерогенным (1) и антиатерогенным (2) действием?\na. ЛПОНП; b. ЛПНП; v. ЛПВП; g. ХМ; d. ЛППП.", options: ["1-v, 2-d","1-a, 2-v","1-g, 2-d","1-b, 2-v"], correct: 3, expl: "Атерогенные — ЛПНП (b); Антиатерогенные — ЛПВП (v)" },
  { text: "На 2-м этапе катаболизма превращение аминокислот (I), углеводов (II), жиров (III) до:\nа) ацетил-КоА; б) глицерин; в) пируват.", options: ["I-а,в; II-в; III-а,б.","I-а,в; II-б; III-а","I-а,б,в; II-б; III-а","I-а,б; II-в; III-б"], correct: 0, expl: "АК → ацетил-КоА и пируват; Углеводы → пируват; Жиры → ацетил-КоА + глицерин" },
  { text: "Коферменты: 1.Моноаминоксидаза; 2.Диаминоксидаза\na. Витамин В6; б. Витамин В2; c. Витамин В3; д. Витамин В7", options: ["1.б 2.a","1.a 2.б","1.б 2.c","1.д 2.a"], correct: 0, expl: "МАО — кофермент ФАД (В2=рибофлавин); ДАО — ПФ (В6=пиридоксин)" },
  { text: "Уровень глюкозы: 1.При сахарном диабете; 2.В норме; 3.При гипогликемии.\nа. 3,5-5,5 ммоль/л; b. 8-10 ммоль/л; с. 0,5-1,5 ммоль/л", options: ["1-b, 2-с, 3-а","1-a, 2-b, 3-с","1-b, 2-a, 3-с","1-с, 2-a, 3-b"], correct: 2, expl: "Диабет: 8-10 ммоль/л; Норма: 3,5-5,5 ммоль/л; Гипогликемия: 0,5-1,5 ммоль/л" },
  { text: "Фермент – функция:\nA) АЛТ; B) АСТ; C) ЩФ; D) ГГТ.\n1.Трансаминирование АК; 2.Отщепление фосфатной группы; 3.Метаболизм глутатиона; 4.Превращение аланина в пируват.", options: ["A–4, B–1, C–2, D–3","A–3, B–1, C–2, D–4","A–4, B–3, C–2, D–1","A–1, B–4, C–2, D–3"], correct: 0, expl: "АЛТ→аланин в пируват; АСТ→трансаминирование; ЩФ→отщепление фосфата; ГГТ→метаболизм глутатиона" },
  { text: "Цитоплазматические (1) и митохондриальные (2) коферменты глицерофосфатдегидрогеназ:\na. НАД; b. ФАД; v. ФМН; g. ТПФ; d. КоА.", options: ["1-a, 2-b","1-a,b; 2-v","1-g, 2-d","1-b, 2-a"], correct: 0, expl: "Цитоплазматическая глицерофосфатдегидрогеназа — НАД (a); Митохондриальная — ФАД (b)" },
  { text: "Дефектный фермент → накапливаемое вещество:\n1.Фенилаланингидроксилаза; 2.Оксидаза гомогентизиновой кислоты; 3.Пролиноксидаза; 4.Аргининосукцинатсинтетаза\na. Цитруллин; b. Пролин; в. Тирозин; г. Фенилаланин", options: ["1в, 2a, 3б, 4г","1a, 2в, 3г, 4б","1г, 2в, 3б, 4a","1б, 2г, 3б, 4в"], correct: 2, expl: "Дефект фенилаланингидроксилазы → ↑фенилаланин (г); дефект оксидазы гомогентизиновой → ↑тирозин (в); пролиноксидаза → ↑пролин (б); аргининосукцинатсинтетаза → ↑цитруллин (a)" },
  { text: "Ферменты при нарушениях обмена:\n1.Алкаптонурия; 2.Тирозинемия; 3.Фенилкетонурия; 4.Уроканатурия\na.Тирозинаминотрансфераза; b.Фенилаланингидроксилаза; в.Урокиназа; г.Гомогентизинат", options: ["1в, 2a, 3б, 4г","1г, 2a, 3б, 4в","1в, 2a, 3г, 4б","1aб, 2в, 3б, 4г"], correct: 1, expl: "Алкаптонурия → гомогентизиназа (г); Тирозинемия → тирозинаминотрансфераза (a); ФКУ → фенилаланингидроксилаза (б); Уроканатурия → урокиназа (в)" },
  { text: "Ферменты при нарушениях обмена:\n1.Аргининосукцинатурия; 2.Гипераргининемия; 3.Альбинизм; 4.Гистидинемия\na.Аргининосукцинатлиаза; б.Аргиназа; в.Тирозиназа; г.Гистидаза", options: ["1г, 2a, 3б, 4в","1б, 2в, 3г, 4a","1a, 2б, 3в, 4г","1в, 2a, 3г, 4б"], correct: 2, expl: "Аргининосукцинатурия → аргининосукцинатлиаза (a); Гипераргининемия → аргиназа (б); Альбинизм → тирозиназа (в); Гистидинемия → гистидаза (г)" },
  { text: "Ферменты при нарушениях обмена:\n1.Гомоцистинурия; 2.Гипераммониемия; 3.Цитруллинемия; 4.Гистидинемия\na.Цистатионин-α-синтетаза; б.Карбамоилсинтетаза; в.Аргининосукцинатсинтетаза; г.Гистидаза", options: ["1б, 2г, 3в, 4a","1г, 2a, 3б, 4в","1aб, 2г, 3в, 4a","1a, 2б, 3в, 4г"], correct: 3, expl: "Гомоцистинурия → цистатионин-α-синтетаза (a); Гипераммониемия → карбамоилсинтетаза (б); Цитруллинемия → аргининосукцинатсинтетаза (в); Гистидинемия → гистидаза (г)" },
  { text: "Биологическая ценность аминокислот:\nA.Незаменимые; Б.Условно незаменимые; C.Заменимые\n1.Лизин; 2.Гистидин; 3.Валин; 4.Аргинин; 5.Триптофан; 6.Аланин; 7.Пролин; 8.Серин; 9.Тирозин; 10.Фенилаланин", options: ["A.1,3,10 Б.2,4 C.5,6,7,8,9","A.1,3,5,10 Б.2,4,9 C.6,7,8","A.5,10 Б.9 C.1,2,3,4,6,7,8","A.1,5,10 Б.2,9 C.3,4,6,7,8"], correct: 1, expl: "Незаменимые: Лизин(1), Валин(3), Триптофан(5), Фенилаланин(10); Условно: Гистидин(2), Аргинин(4), Тирозин(9); Заменимые: Аланин(6), Пролин(7), Серин(8)" },
  { text: "Свойства генетического кода:\n1.Триплетность; 2.Вырожденность; 3.Универсальность; 4.Неперекрываемость\na.Три нуклеотида; b.Несколько кодонов; c.Почти одинаков у всех; d.Без наложения", options: ["1-b, 2-a, 3-c, 4-d","1-a, 2-b, 3-c, 4-d","1-a, 2-c, 3-b, 4-d","1-d, 2-b, 3-c, 4-a"], correct: 1, expl: "Триплетность=три нуклеотида; Вырожденность=несколько кодонов; Универсальность=одинаков у всех; Неперекрываемость=без наложения" },
  { text: "Сколько АТФ при полном окислении пальмитиновой (1) и стеариновой (2) кислот?\na.131; b.148; v.120; g.100; d.50.", options: ["1-v, 2-d","1-a, 2-b","1-g, 2-d","1-b, 2-a"], correct: 1, expl: "Пальмитиновая C16 → ~131 АТФ (a); Стеариновая C18 → ~148 АТФ (b)" },
  { text: "Сколько НАДФН₂ для синтеза пальмитиновой (1) и стеариновой (2) кислот?\na.14; b.16; v.13; g.15; d.12.", options: ["1-a, 2-b","1-b, 2-a","1-v, 2-d","1-g, 2-d"], correct: 0, expl: "Пальмитиновая (7 циклов × 2 = 14 НАДФН₂) (a); Стеариновая (8 циклов × 2 = 16 НАДФН₂) (b)" },
  { text: "Белок – функция:\nа) Миоглобин; b) Креатинкиназа; с) Тропомиозин.\n1-Перенос O₂ в мышцах; 2-Регуляция сокращения; 3-Катализирует образование КФ", options: ["а–1, b–3, с–2","с–1, b–3, a–2","b–1, b–3, с–2","а–1, b–3, a–2"], correct: 0, expl: "Миоглобин→перенос O₂; Креатинкиназа→синтез КФ; Тропомиозин→регуляция сокращения" },
  { text: "Вещество – функция в мышце:\na) Регуляция через Ca²⁺; b) Сократительный белок тонких филаментов; c) Белок толстых филаментов с АТФ-азной активностью.\n1-Актин; 2-фибрин; 3-миозин; 4-плазмин; 5-тропонин.", options: ["b–5, b–1, с–3","a–5, b–1, с–3","a–5, a–1, с–3","с–5, b–1, a–3"], correct: 1, expl: "Тропонин(5)→регуляция через Ca²⁺; Актин(1)→тонкие филаменты; Миозин(3)→АТФ-азная активность" },
  { text: "Гормон – функция:\na) ↑Ca²⁺; b) ↑реабсорбции Na⁺; c) ↓глюкозы; d) ↑глюкозы; e) ↓Ca²⁺\n1-Инсулин; 2-Глюкагон; 3-Кальцитриол; 4-Паратгормон; 5-Альдостерон", options: ["b-3, а-1, с-5, е-2","е-3, b-1, с-5, d-4, а-2","а-3, b-1, с-5, d-4, а-2","d-3, c-1, a-5, b-4, е-2","c-1, d-2, e-3, a-4, b-5"], correct: 4, expl: "Инсулин(1)→↓глюкозу; Глюкагон(2)→↑глюкозу; Кальцитонин(3)→↓Ca²⁺; Паратгормон(4)→↑Ca²⁺; Альдостерон(5)→↑Na⁺ реабсорбция" },
  { text: "Гормон – железа:\na) аденогипофиз; b) гипоталамус; c) нейрогипофиз\n1-ТТГ; 2-Кортиколиберин; 3-инсулин; 4-глюкагон; 5-вазопрессин", options: ["с-1, b-2, а-5","а-1, b-2","b-2, с-5","а-1, b-2, с-5"], correct: 3, expl: "ТТГ→аденогипофиз(а); Кортиколиберин→гипоталамус(b); Вазопрессин→нейрогипофиз(с)" },
  { text: "Гормон – место синтеза:\na) Щитовидная железа; b) Поджелудочная железа; c) Кора надпочечников; d) Мозговое вещество надпочечников\n1-Инсулин; 2-Тироксин; 3-Кортизол; 4-Адреналин", options: ["а-2, b-1, с-3, d-4","с-2, b-1, d-3, a-4","а-2, a-1, b-3, c-4","b-2, a-1, с-3, d-4"], correct: 0, expl: "Щитовидная→тироксин(а-2); Поджелудочная→инсулин(b-1); Кора НП→кортизол(с-3); Мозговое вещество НП→адреналин(d-4)" },
  { text: "Гормон – механизм действия:\nа) Внутриклеточные рецепторы; b) Тирозинкиназный рецептор; с) Система цАМФ; d) Ядерные рецепторы; е) β-адренорецепторы\n1-Инсулин; 2-Адреналин; 3-Кортизол; 4-Тироксин; 5-Глюкагон", options: ["b-3, а-1, с-5, е-2","е-3, b-1, с-5, d-4, а-2","а-3, b-1, с-5, d-4, е-2","d-1, e-5, d-4, b-2"], correct: 2, expl: "Кортизол(3)→внутриклеточные рецепторы; Инсулин(1)→тирозинкиназный рецептор; Глюкагон(5)→цАМФ; Тироксин(4)→ядерные рецепторы; Адреналин(2)→β-адренорецепторы" },
  { text: "Гормон – химическая структура:\nа) Белковый гормон; b) Производное аминокислот; с) Йодсодержащий гормон; d) Стероидный гормон\n1-Инсулин; 2-Адреналин; 3-Тироксин; 5-Кортизол", options: ["b-1, d-2, с-3, а-5","а-1, b-2, с-3, d-5","а-1, d-2, с-3, b-5","а-1, c-2, d-3, b-5"], correct: 1, expl: "Инсулин→белковый(а); Адреналин→производное АК(b); Тироксин→йодсодержащий(с); Кортизол→стероидный(d)" },
  { text: "Ион – роль в почках:\na) Активно реабсорбируется; б) Потенциал действия; с) Реабсорбируется под ПТГ; д) Выводится для кислотности; е) КЩР\n1-Na; 2-Ca; 3-K; 4-H; 5-HCO₃", options: ["a-1, c-2, e-3, d-4, b-5","е-3, b-1, с-5, d-4, а-2","a-1, c-2, b-3, d-4, e-5","с-3, b-1, e-5, d-4, а-2"], correct: 2, expl: "Na⁺(1)→активная реабсорбция; Ca²⁺(2)→под действием ПТГ; K⁺(3)→потенциал действия; H⁺(4)→поддержание кислотности; HCO₃⁻(5)→КЩР" },
  { text: "Источник энергии – характеристика:\nа) АТФ; b) Креатинфосфат; с) Гликолиз\n1-Быстрое восстановление АТФ; 2-Непосредственный источник; 3-Анаэробное образование", options: ["с-2, b-1, с-3","с-2, b-1, a-3","а-2, b-1, с-3","b-2, a-1, с-3"], correct: 2, expl: "АТФ(а)→непосредственный источник(2); КФ(b)→быстрое восстановление АТФ(1); Гликолиз(с)→анаэробный(3)" },
  { text: "Показатель мочи – норма:\na) Белок; b) Глюкоза; c) Креатинин; d) Мочевина; e) pH\n1-0–0,1 г/л; 2-Повышается при гликозурии; 3-Отражает клубочковую фильтрацию; 4-Отражает азотистый обмен; 5-4,5–8,0", options: ["a-1, d-2, c-3, b-4, e-5","е-3, b-1, с-5, d-4, а-2","с-3, b-1, d-5, e-4, а-2","a-1, b-2, c-3, d-4, e-5"], correct: 3, expl: "Белок 0-0,1 г/л; Глюкоза↑при гликозурии; Креатинин→клубочковая фильтрация; Мочевина→азотистый обмен; pH 4,5-8,0" },
  { text: "Процесс – описание:\na) Первичный фильтрат через капсулу Боумена; b) Обратное всасывание; c) Перемещение веществ из крови в канальцы; d) Осмотический градиент в петле Генле\n1-клубочковая фильтрация; 2-реабсорбция; 3-секреция; 4-концентрация мочи", options: ["b-3, а-1, с-5, е-2","е-3, b-1, с-5, d-4, а-2","a-1, b-2, c-3, d-4","b-1, с-5, d-4, а-2"], correct: 2, expl: "Первичный фильтрат→клубочковая фильтрация; Реабсорбция→канальцевая реабсорбция; Из крови в канальцы→секреция; Осмотический градиент→концентрация мочи" },
  { text: "Фермент/белок – функция в почке:\na) Аминотрансферазы; b) Уреаза; c) Креатинкиназа; d) Глютамин; e) Na⁺/K⁺-АТФаза\n1-перенос аминогрупп; 2-расщепление мочевины; 3-энергобаланс; 4-формирование NH₄⁺; 5-обмен Na⁺/K⁺", options: ["a-1, b-2, c-3, d-4, e-5","b-1, a-2, c-3, d-4, e-5","d-1, b-2, a-3, c-4, e-5","с-3, b-1, e-5, d-4, а-2"], correct: 0, expl: "Аминотрансферазы→перенос NH₂; Уреаза→расщепление мочевины; Креатинкиназа→энергобаланс; Глутамин→формирование NH₄⁺; Na⁺/K⁺-АТФаза→обмен Na⁺/K⁺" },
  { text: "Биохимический показатель – патологическое состояние:\nA) Глюкоза↑; B) Холестерин↑; C) Триглицериды↑; D) Альбумин↓\n1.Сахарный диабет; 2.Атеросклероз; 3.Гиперлипидемия; 4.Патологии печени.", options: ["A-1; B-2; C-3; D-4","A-4; B-2; C-3; D-1","A-1; B-3; C-2; D-4","A-3; B-1; C-2; D-4"], correct: 0, expl: "Глюкоза↑→диабет; Холестерин↑→атеросклероз; ТГ↑→гиперлипидемия; Альбумин↓→патология печени" },
  { text: "Вещество – место/происхождение:\nA) Уробилин; B) Стеркобилин; C) Билирубин; D) Биливердин\n1.Желчный пигмент; 2.Пигмент мочи; 3.Пигмент кала; 4.Продукт распада гема.", options: ["A-2, B-1, C-3, D-4","A-4, B-3, C-1, D-2","A-2, B-4, C-1, D-3","A-2, B-3, C-1, D-4"], correct: 3, expl: "Уробилин→пигмент мочи(2); Стеркобилин→пигмент кала(3); Билирубин→желчный пигмент(1); Биливердин→продукт распада гема(4)" },
  { text: "Фермент – орган с наибольшим содержанием:\nA) АЛТ; B) АСТ; C) ЩФ; D) ГГТ\n1.Гепатоциты; 2.Миокард; 3.Желчевыводящие пути; 4.Костная ткань.", options: ["A-2; B-1; C-4; D-3","A-1; B-2; C-4; D-3","A-3; B-2; C-4; D-1","A-4; B-2; C-3; D-1"], correct: 1, expl: "АЛТ→гепатоциты(1); АСТ→миокард(2); ЩФ→костная ткань(4); ГГТ→желчевыводящие пути(3)" },
  { text: "Аминокислота – биогенный амин при декарбоксилировании:\n1.5-Окситриптофан; 2.Глутамат; 3.ДОФА; 4.Гистидин\na.Гистамин; б.ГАМК; в.ДОФАмин; г.Спермин; д.Мелатонин; е.Серотонин", options: ["1.e,2.б,3.г,4.д","1.б,2.д,3.г,4.в","1.д,2.б,3.в,4.a","1.а,2.б,3.в,4.г","1.д,е;2.б;3.в;4.а"], correct: 4, expl: "5-Окситриптофан→мелатонин(д)+серотонин(е); Глутамат→ГАМК(б); ДОФА→дофамин(в); Гистидин→гистамин(а)" },
  { text: "Бактериальная ферментация аминокислот в кишечнике:\n1.Фенилаланин; 2.Тирозин; 3.Триптофан\na.крезол; б.индол; в.скатол; д.фенилэтиламин; е.фенол", options: ["1.б,2вe,3.д","1.ae,2.д,3.бв","1.д,2.ae,3.бв","1д,2.aб,3.вe"], correct: 2, expl: "Фенилаланин→фенилэтиламин(д); Тирозин→крезол(а)+фенол(е); Триптофан→индол(б)+скатол(в)" },
  { text: "Группы ферментов в плазме крови:\n1.Секреторные; 2.Индикаторные; 3.Экскреторные\na.АЛТ; b.ЛДГ; v.ЛХАТ; g.ЛПЛ; d.Амилаза; е.Липаза", options: ["1-a,b; 2-v,g; 3-d,e","1-v,g; 2-a,b; 3-d,e","1-v,2-g,a; 3-b","1-b,g; 2-a,v; 3-d"], correct: 1, expl: "Секреторные: ЛХАТ(v)+ЛПЛ(g); Индикаторные: АЛТ(a)+ЛДГ(b); Экскреторные: амилаза(d)+липаза(e)" },
  { text: "Дефектные ферменты и гликогенозы:\n1-Фон Гирке; 2-Помпе; 3-Форбс-Кори\nа) глюкозо-6-фосфатаза; б) альфа-1,4-глюкозидаза; в) амило-1,6-глюкозидаза.", options: ["1-а; 2-в; 3-б.","1-б; 2-а; 3-в.","1-а; 2-б; 3-в.","1-в; 2-a; 3-b."], correct: 2, expl: "Фон Гирке→глюкозо-6-фосфатаза; Помпе→α-1,4-глюкозидаза; Форбс-Кори→амило-1,6-глюкозидаза" },
  { text: "Метаболит – антиметаболит:\n1.Фолиевая кислота; 2.Сукцинат; 3.Витамин K\na.варфарин; б.глюкоза; в.Метотрексат; г.Малонат", options: ["1.в,2aб,3.г","1.e,2a,3.c","1.бв,2a,3.г","1.в,2.г,3.a"], correct: 3, expl: "Фолиевая кислота↔Метотрексат(в); Сукцинат↔Малонат(г); Витамин K↔Варфарин(а)" },
  { text: "Скорость обновления белков:\n1.До 10 дней; 2.100 дней; 3.До 20 дней\nа.печень; б.поджелудочная железа; в.гормоны и ферменты; г.гемоглобин; д.белки кожи и мышц; е.коллаген", options: ["1.aб,2.вг,3.де","1.aв,2бг,3.дж","1.бв,2а,3.гд","1.aб,2.г,д; 3.ж"], correct: 0, expl: "До 10 дней: печень(а)+поджелудочная(б); 100 дней: гормоны/ферменты(в)+гемоглобин(г); До 20 дней: белки кожи/мышц(д)+коллаген(е)" },
  { text: "Полимеры меланина:\n1.Эумеланин; 2.Феомеланин\na.чёрный; б.жёлтый; c.рыжевато-коричневый; д.коричневый", options: ["1.aбc,2.д","1.a,2.бcд","1.aб,2.cд","1.бc,2.aд"], correct: 1, expl: "Эумеланин→чёрный(а); Феомеланин→жёлтый(б)+рыжевато-коричневый(с)+коричневый(д)" },
  { text: "Субстраты специфичные к ферментам:\n1-пируваткиназа; 2-пируваткарбоксилаза; 3-аконитаза; 4-альдолаза B\nа) пируват; б) фосфоенолпируват; в) фруктозо-1-фосфат; г) цитрат.", options: ["1-а; 2-б; 3-г; 4-в.","1-б; 2-а; 3-г; 4-в.","1-а; 2-б; 3-в; 4-г.","1-б; 2-а; 3-в; 4-г."], correct: 1, expl: "Пируваткиназа→ФЕП(б); Пируваткарбоксилаза→пируват(а); Аконитаза→цитрат(г); Альдолаза B→фруктозо-1-фосфат(в)" },
  { text: "Типы гликогеновых болезней и дефектные ферменты:\n1-Андерсен; 2-МакАрдл; 3-Герс; 4-агликогеноз\nа) гликогенфосфорилаза печени; б) гликогенфосфорилаза мышц; в) гликогенсинтаза; г) фермент ветвления.", options: ["1-а,2-b,3-c,4-d.","1-d,2-b,3-a,4-c.","1-c,2-b,3-a,4-d.","1-c,2-a,3-b,4-d."], correct: 1, expl: "Андерсен→фермент ветвления(г); МакАрдл→гликогенфосфорилаза мышц(б); Герс→гликогенфосфорилаза печени(а); Агликогеноз→гликогенсинтаза(в)" },
  { text: "Транспортеры глюкозы и ткани:\n1.GLUT-1; 2.GLUT-2; 3.GLUT-3\nа) печень; б) плацента; в) эритроцит; г) почка; д) бета-клетки ПЖЖ.", options: ["1-в; 2-a,г,д; 3-б","1-в,б; 2-a,д; 3-г.","1-a,б; 2-в,г; 3-д","1-б; 2-a,г,д; 3-в"], correct: 0, expl: "GLUT-1→эритроциты(в); GLUT-2→печень+почки+β-клетки(а,г,д); GLUT-3→плацента(б)" },

  { text: "РНК-полимераза – тип РНК (эукариоты):\n1.РНК-полимераза I; 2.РНК-полимераза II; 3.РНК-полимераза III\na.мРНК; b.рРНК (18S,5.8S,28S); c.тРНК", options: ["1-a,2-b,3-c","1-b,2-a,3-c","1-c,2-a,3-b","1-b,2-c,3-a"], correct: 1, expl: "РНК-пол I→рРНК 18S,5.8S,28S(b); РНК-пол II→мРНК(а); РНК-пол III→тРНК(с)" },
  { text: "Ферменты и коферменты:\n1.Пиридинзависимые дегидрогеназы; 2.Флавинзависимые дегидрогеназы; 3.Убихинон; 4.Цитохромы\nа) НАД; б) кофермент Q; в) ФМН; г) Fe²⁺.", options: ["1б,2в,3a,4г","1г,2а,3в,4б","1а,2в,3г,4б","1в,2а,3г,4б","1а,2в,3б,4г"], correct: 4, expl: "Пиридинзависимые→НАД(а); Флавинзависимые→ФМН(в); Убихинон→коэнзим Q(б); Цитохромы→Fe²⁺(г)" },

let cur = 0, score = 0, sel = null, explVisible = false;
const total = questions.length;

function render() {
  const q = questions[cur];
  document.getElementById('q-num').textContent = `Вопрос ${cur+1} из ${total}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('progress-fill').style.width = `${(cur/total)*100}%`;
  document.getElementById('header-score').textContent = `✓ ${score} / ${total}`;
  document.getElementById('feedback').classList.remove('show');
  document.getElementById('explanation').classList.remove('show');
  document.getElementById('explanation').textContent = '';
  explVisible = false;

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.options.forEach((o, i) => {
    const b = document.createElement('button');
    b.className = 'opt-btn';
    b.innerHTML = `<span class="opt-letter">${String.fromCharCode(65+i)}</span><span>${o}</span>`;
    b.onclick = () => choose(i);
    opts.appendChild(b);
  });
}

function choose(i) {
  if (sel !== null) return;
  sel = i;
  const q = questions[cur];
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => b.disabled = true);
  btns[q.correct].classList.add('correct');
  if (i !== q.correct) btns[i].classList.add('wrong');
  if (i === q.correct) score++;

  const fb = document.getElementById('feedback');
  document.getElementById('fb-icon').textContent = i === q.correct ? '✅' : '❌';
  document.getElementById('fb-label').textContent = i === q.correct ? 'Правильно!' : 'Неправильно';
  document.getElementById('fb-label').style.color = i === q.correct ? '#00e676' : '#ff5252';
  document.getElementById('explanation').textContent = q.expl;
  document.getElementById('next-btn').textContent = cur+1 >= total ? 'Завершить тест' : 'Следующий вопрос →';
  fb.classList.add('show');
  document.getElementById('header-score').textContent = `✓ ${score} / ${total}`;
}

function toggleExpl() {
  explVisible = !explVisible;
  const el = document.getElementById('explanation');
  explVisible ? el.classList.add('show') : el.classList.remove('show');
  document.getElementById('expl-btn').textContent = explVisible ? 'Скрыть' : 'Пояснение';
}

function nextQ() {
  cur++;
  sel = null;
  if (cur >= total) { showFinish(); return; }
  render();
}

function showFinish() {
  document.getElementById('card').style.display = 'none';
  const pct = Math.round(score/total*100);
  const grade = pct>=90?{l:'Отлично!',c:'#00e676',e:'🏆'}:pct>=75?{l:'Хорошо!',c:'#69f0ae',e:'✅'}:pct>=60?{l:'Удовлетворительно',c:'#ffd740',e:'📚'}:{l:'Нужно повторить',c:'#ff5252',e:'💪'};
  document.getElementById('finish-emoji').textContent = grade.e;
  document.getElementById('finish-title').textContent = grade.l;
  document.getElementById('finish-title').style.color = grade.c;
  document.getElementById('score-pct').textContent = pct+'%';
  document.getElementById('score-pct').style.color = grade.c;
  document.getElementById('score-sub').textContent = `${score} / ${total} верных`;
  document.getElementById('finish').classList.add('show');
}

function restart() {
  cur=0; score=0; sel=null;
  document.getElementById('card').style.display='block';
  document.getElementById('finish').classList.remove('show');
  render();
}

render();
</script>
