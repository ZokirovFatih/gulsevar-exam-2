  {q:"Конечные продукты тирозина в печени:",o:["Фенилаланин","Фумарат","Ацетоацетат","Тироксин","Цитрат"],c:[1,2]},
  {q:"Стоп-кодоны:",o:["UAA","UAG","UGA","AUG","UGG"],c:[0,1,2]},

let cur=0,sel=[],done=false,score=0,results=[];

function render(){
  const q=Q[cur],total=Q.length;
  document.getElementById('qnum').textContent=`#${cur+96} (${cur+1}/${total})`;
  document.getElementById('pfill').style.width=`${(cur/total)*100}%`;
  document.getElementById('qtext').textContent=q.q;
  document.getElementById('sc').textContent=score;
  document.getElementById('sc2').textContent=cur+(done?1:0);
  const btn=document.getElementById('mainBtn');
  if(!done){btn.textContent='Проверить';btn.disabled=sel.length===0;}
  else{btn.textContent=cur+1>=Q.length?'Завершить':'Следующий →';btn.disabled=false;}
  const optDiv=document.getElementById('opts');
  optDiv.innerHTML='';
  q.o.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt';
    const isSel=sel.includes(i),isCorr=q.c.includes(i);
    if(done){if(isCorr)b.classList.add('correct');else if(isSel)b.classList.add('wrong');}
    else if(isSel)b.classList.add('selected');
    b.innerHTML=`<span class="letter">${String.fromCharCode(65+i)}</span><span style="flex:1">${o}</span>${done&&isCorr?'<span class="mark" style="color:#22c55e">✓</span>':''}${done&&isSel&&!isCorr?'<span class="mark" style="color:#ef4444">✗</span>':''}`;
    if(!done)b.onclick=()=>{sel=sel.includes(i)?sel.filter(x=>x!==i):[...sel,i];render();};
    optDiv.appendChild(b);
  });
}

function handleBtn(){
  if(!done){
    const q=Q[cur];
    const ok=[...q.c].sort().join()===[...sel].sort().join();
    results.push({q:q.q,opts:q.o,correct:q.c,sel:[...sel],ok});
    if(ok)score++;
    done=true;render();
  } else {
    cur++;
    if(cur>=Q.length){showFin();return;}
    sel=[];done=false;render();
  }
}

function showFin(){
  document.getElementById('quiz').style.display='none';
  const f=document.getElementById('fin');f.style.display='block';
  const pct=Math.round((score/Q.length)*100);
  document.getElementById('finIcon').textContent=pct>=70?'🏆':pct>=50?'📚':'💪';
  document.getElementById('finScore').textContent=score;
  document.getElementById('finTotal').textContent=Q.length;
  const bar=document.getElementById('finBar');
  bar.style.width=`${pct}%`;
  bar.style.background=pct>=70?'#22c55e':pct>=50?'#f59e0b':'#ef4444';
  document.getElementById('finPct').textContent=`${pct}% правильных ответов`;
  const rl=document.getElementById('revList');rl.innerHTML='';
  results.forEach((r,i)=>{
    const d=document.createElement('div');
    d.className='rev-item'+(r.ok?'':' wrong-r');
    d.innerHTML=`<p class="rev-q"><b>${i+96}.</b> ${r.q}</p><p class="rev-status" style="color:${r.ok?'#22c55e':'#ef4444'}">${r.ok?'✓ Верно':'✗ Неверно'}</p>${!r.ok?`<p class="rev-ans">Правильно: ${r.correct.map(idx=>r.opts[idx]).join(', ')}</p>`:''}`;
    rl.appendChild(d);
  });
}

function restart(){
  cur=0;sel=[];done=false;score=0;results=[];
  document.getElementById('fin').style.display='none';
  document.getElementById('quiz').style.display='block';
  render();
}

render();
</script>
